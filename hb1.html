<html>
  <head>
    <meta name="apple-itunes-app" content="app-id=1068841746">
    <meta name="google-play-app" content="app-id=com.tmobtech.halkbank">
    <style>
      #smartbanner {
          position: absolute;
          left: 0;
          top: -82px;
          width: 100%;
          height: 78px;
          font-family: "Source Sans Pro", Arial, Helvetica, sans-serif;
          background: #005697;
          z-index: 9998;
          -webkit-font-smoothing: antialiased;
          overflow: hidden;
          -webkit-text-size-adjust: none
      }
      
      #smartbanner,html.sb-animation {
          -webkit-transition: all .3s ease
      }
      
      #smartbanner .sb-container {
          margin: 0 auto
      }
      
      #smartbanner .sb-close {
          position: absolute;
          left: 5px;
          top: 28px;
          display: block;
          font-family: 'ArialRoundedMTBold',Arial;
          font-size: 20px;
          line-height: 20px;
          text-align: center;
          color: #fff;
          text-decoration: none;
      }
      
      #smartbanner .sb-close:active {
          font-size: 13px;
          color: #aaa
      }
      
      #smartbanner .sb-icon {
          position: absolute;
          left: 30px;
          top: 10px;
          display: block;
          width: 57px;
          height: 57px;
          background: rgba(0,0,0,.6);
          background-size: cover;
          border-radius: 10px;
          box-shadow: 0 1px 3px rgba(0,0,0,.3)
      }
      
      #smartbanner.no-icon .sb-icon {
          display: none
      }
      
      #smartbanner .sb-info {
          position: absolute;
          left: 98px;
          top: 18px;
          width: 44%;
          font-size: 12px;
          line-height: 1.2em;
          font-weight: bold;
          color: #ffffff;
      }
      
      #smartbanner #smartbanner.no-icon .sb-info {
          left: 34px
      }
      
      #smartbanner .sb-info strong {
          display: block;
          font-size: 16px;
          color: #ffffff;
          line-height: 18px
      }
      
      #smartbanner .sb-info>span {
          display: block
      }
      
      #smartbanner .sb-info em {
          font-style: normal;
          text-transform: uppercase
      }
      
      #smartbanner .sb-button {
          position: absolute;
          right: 20px;
          top: 24px;
          min-width: 10%;
          height: 36px;
          font-size: 14px;
          line-height: 36px;
          text-align: center;
          font-weight: bold;
          color: #005697;
          background: #FFFFFF;
          text-transform: uppercase;
          text-decoration: none;
      }
      
      #smartbanner .sb-button:active,#smartbanner .sb-button:hover {
          background: -webkit-linear-gradient(top,#dcdcdc 0%,#efefef 100%)
      }
      
      #smartbanner .sb-icon.gloss:after {
          content: '';
          position: absolute;
          left: 0;
          top: -1px;
          border-top: 1px solid rgba(255,255,255,.8);
          width: 100%;
          height: 50%;
          background: -webkit-linear-gradient(top,rgba(255,255,255,.7) 0%,rgba(255,255,255,.2) 100%);
          border-radius: 10px 10px 12px 12px
      }
      
      #smartbanner.android .sb-close {
          border: 0;
          width: 20px;
          height: 20px;
          line-height: 20px;
          color: #ffffff;
      }
      
      #smartbanner.android .sb-close:active {
          color: #eee
      }
      
      #smartbanner.android .sb-info {
          color: #fff;
      }
      
      #smartbanner.android .sb-info strong {
          color: #fff
      }
      
      #smartbanner.android .sb-button {
          min-width: 12%;
          color: #005697;
          min-height: 36px
      }
      
      #smartbanner.android .sb-button span {
          text-align: center;
          display: block;
          padding: 0 10px;
          background-color: #FFFFFF;
          text-transform: none;
      }
      
      #smartbanner.android .sb-button:active,#smartbanner.android .sb-button:hover {
          background: none
      }
      
      #smartbanner.android .sb-button:active span,#smartbanner.android .sb-button:hover span {
          background: #2ac7e1
      }
      
      #smartbanner.windows .sb-icon {
          border-radius: 0
      }
    </style>
  </head>
  <body>
    <h1>Mobil Uygulama Yönlendirme Smartbanner Test!</h1>
    <script type="text/javascript" src="jquery.min.js"></script>
    <script src="jquery.smartbanner.js"></script>
    <script type="text/javascript">
        $(function () {
            $.smartbanner({
                title: 'Halkbank Mobil',
                author: 'T.C. Halkbank A.Ş.',
                price: '',
                icon: 'https://www.halkbank.com.tr/content/dam/corporate-website/tr/logo/logo-halkbank-navy.svg',
                appStoreLanguage: 'tr',
                button: 'GÖSTER',
                daysHidden: 0,
                daysReminder: 0
            });
        });
    </script>
  </body>
</html>
